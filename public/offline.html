<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Offline · Acity Sports Center</title>
    <style>
      body {
        margin: 0;
        min-height: 100vh;
        display: flex;
        align-items: center;
        justify-content: center;
        font-family: system-ui, -apple-system, sans-serif;
        background: #f9fafb;
        color: #111827;
        text-align: center;
        padding: 1.5rem;
      }
      .card {
        max-width: 22rem;
      }
      .badge {
        width: 4rem;
        height: 4rem;
        border-radius: 9999px;
        background: #1d4ed8;
        color: #fff;
        font-size: 1.75rem;
        display: flex;
        align-items: center;
        justify-content: center;
        margin: 0 auto 1rem;
      }
      h1 { font-size: 1.25rem; margin: 0 0 0.5rem; }
      p { color: #6b7280; font-size: 0.9rem; line-height: 1.5; }
      button {
        margin-top: 1.25rem;
        background: #1d4ed8;
        color: #fff;
        border: 0;
        padding: 0.65rem 1.25rem;
        border-radius: 0.75rem;
        font-weight: 600;
        cursor: pointer;
      }
    </style>
  </head>
  <body>
    <div class="card">
      <div class="badge">🏆</div>
      <h1>You're offline</h1>
      <p>Acity Sports Center can't reach the network right now. Check your connection and try again — live scores will reload automatically once you're back.</p>
      <button onclick="location.reload()">Retry</button>
    </div>
  </body>
</html>
